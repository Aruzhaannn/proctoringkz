name: CD – Deploy to Production

on:
  push:
    tags:
      - 'v*'          # Trigger on version tags: v1.0.0, v2.3.1 …

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/proktorai

jobs:
  # ── Build & Push Docker images ────────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
          - service: ai-service
            context: ./ai-service
          - service: frontend
            context: ./proktorai-kz

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Kubernetes ──────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update image tags in manifests
        run: |
          TAG=${{ github.ref_name }}
          sed -i "s|:latest|:${TAG}|g" k8s/backend.yml k8s/ai-service.yml k8s/frontend.yml
          sed -i "s|YOUR_GITHUB_USERNAME|${{ github.repository_owner }}|g" \
            k8s/backend.yml k8s/ai-service.yml k8s/frontend.yml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yml
          kubectl apply -f k8s/secrets.yml
          kubectl apply -f k8s/postgres.yml
          kubectl apply -f k8s/redis.yml
          kubectl apply -f k8s/kafka.yml
          kubectl apply -f k8s/backend.yml
          kubectl apply -f k8s/ai-service.yml
          kubectl apply -f k8s/frontend.yml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend   -n proktorai --timeout=120s
          kubectl rollout status deployment/frontend  -n proktorai --timeout=60s
          echo "ProktorAI ${{ github.ref_name }} успешно развернут!"